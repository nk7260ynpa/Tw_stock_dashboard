services:
  tw_stock_dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: nk7260ynpa/tw_stock_dashboard:latest
    container_name: tw_stock_dashboard
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - ../logs:/app/logs
    networks:
      - db_network

networks:
  db_network:
    external: true
