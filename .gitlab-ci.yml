# GitLab CI/CD：GitLab Flow 建置 / 升版 / 部署管線
# 對照來源：.github/workflows/docker-publish.yml
#
# ── 流程總覽（GitLab Flow）─────────────────────────────────────────
#   1. 於 main 推送符合 v*.*.* 的 tag → build：
#      用 docker/Dockerfile 建置 image，推送 <版本號> 與 latest 兩個標籤到 Harbor。
#   2. 將 main 合併進 production 分支 → promote：
#      將 Harbor 上的 latest 重新打上 production 標籤並推回 Harbor。
#   3. 同一次 production 分支管線 → deploy：
#      拉取 production 標籤的 image，重啟 tw_stock_dashboard 容器完成部署。
#
# ── 認證來源 ───────────────────────────────────────────────────────
# 下列變數由 GitLab Runner 注入（設定於 runner 的 config.toml [[runners]].environment，
# 其值來源為 gitlab-runner/.env，未進版控）：
#   HARBOR_USERNAME  Harbor 帳號
#   HARBOR_PASSWORD  Harbor 密碼
#   HARBOR_REGISTRY  Harbor registry 位址（127.0.0.1:8081）
#
# ── Runner 形態 ────────────────────────────────────────────────────
# 本 runner 為 docker executor 並掛載 /var/run/docker.sock（socket 綁定），docker 指令
# 直接在「主機 daemon」上執行，因此無需 docker:dind / privileged。push 目標
# 127.0.0.1:8081 即主機上的 Harbor；127.0.0.1 屬 Docker 預設 insecure registry，免額外設定。

stages:
  - build
  - promote
  - deploy

variables:
  HARBOR_PROJECT: "twstock"            # Harbor 專案名稱（對應 project id 2）
  IMAGE_NAME: "tw_stock_dashboard"     # image 名稱

# ── 1. build：tag 觸發，建置並推送 <版本號> 與 latest ──────────────
build-and-push:
  stage: build
  image: docker:27
  rules:
    # 僅在符合 v*.*.* 的 tag 上執行（等同 GitHub Action 的 tags: 'v*.*.*'）
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  before_script:
    # 由 tag 取出版本號，去掉開頭的 v（v1.2.0 → 1.2.0）
    - export VERSION="${CI_COMMIT_TAG#v}"
    # 登入 Harbor（密碼以 stdin 傳入，避免出現在行程清單）
    - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USERNAME" --password-stdin
  script:
    - docker build
        --file docker/Dockerfile
        --tag "$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:$VERSION"
        --tag "$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:latest"
        .
    - docker push "$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:$VERSION"
    - docker push "$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:latest"

# ── 2. promote：production 分支觸發，將 latest 升版為 production ─────
promote-production:
  stage: promote
  image: docker:27
  rules:
    # 僅在 production 分支推送時執行
    - if: '$CI_COMMIT_BRANCH == "production"'
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USERNAME" --password-stdin
  script:
    - export LATEST_IMAGE="$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:latest"
    - export PROD_IMAGE="$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:production"
    # 取最新的 latest，重新打上 production 標籤後推回 Harbor
    - docker pull "$LATEST_IMAGE"
    - docker tag "$LATEST_IMAGE" "$PROD_IMAGE"
    - docker push "$PROD_IMAGE"

# ── 3. deploy：production 分支觸發，拉取 production image 重啟容器 ───
deploy-production:
  stage: deploy
  image: docker:27
  rules:
    # 僅在 production 分支推送時執行（接續 promote 之後）
    - if: '$CI_COMMIT_BRANCH == "production"'
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USERNAME" --password-stdin
  script:
    - export PROD_IMAGE="$HARBOR_REGISTRY/$HARBOR_PROJECT/$IMAGE_NAME:production"
    # 拉取剛升版的 production image
    - docker pull "$PROD_IMAGE"
    # 移除舊容器（若存在）後以 production image 重新啟動
    - docker rm -f tw_stock_dashboard || true
    # 註：runner 為 socket 綁定，CI 工作目錄非主機路徑，故 logs 改用具名 volume
    #     （tw_stock_dashboard_logs）持久化，避免 bind mount 主機路徑不一致。
    - docker run -d
        --name tw_stock_dashboard
        --restart=always
        --network db_network
        --publish 127.0.0.1:8002:8000
        --volume tw_stock_dashboard_logs:/app/logs
        "$PROD_IMAGE"
